<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conteúdo Exclusivo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #0b0b0b;
            display: flex;
            justify-content: center;
            align-items: flex-start; 
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }

        .main-container {
            text-align: center;
            /* Controla a altura de todo o conjunto na tela */
            margin-top: 45vh; 
        }

        .title {
            color: #ffffff;
            font-size: 1.5rem;
            font-weight: 700;
            /* Diminuído para o texto ficar "colado" no botão */
            margin-bottom: 1.2rem; 
            letter-spacing: -0.025em;
        }

        .btn-acesso {
            display: inline-block;
            background: linear-gradient(90deg, #9131F7 0%, #E22194 100%);
            color: white;
            /* Botão bem largo nas laterais */
            padding: 1.2rem 7rem; 
            border-radius: 0.8rem;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 1.1rem;
            letter-spacing: 0.05em;
            text-decoration: none;
            border: none;
            cursor: pointer;
            position: relative;
            animation: pulse-animation 1.2s infinite;
            white-space: nowrap; 
        }

        @keyframes pulse-animation {
            0% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(145, 49, 247, 0.7);
            }
            70% {
                transform: scale(1.03);
                box-shadow: 0 0 0 20px rgba(145, 49, 247, 0);
            }
            100% {
                transform: scale(1);
                box-shadow: 0 0 0 0 rgba(145, 49, 247, 0);
            }
        }

        .btn-acesso:active {
            transform: scale(0.95);
            animation: none;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h1 class="title">Conteúdo exclusivo</h1>
        
        <button onclick="irParaDestino()" class="btn-acesso">
            Acessar Agora
        </button>
    </div>

    <script>
        function irParaDestino() {
            // Substitua pelo seu link de checkout/sharkbot
            const linkDestino = "https://encurtar-link.click/u/verifique-agora";
            const urlParams = window.location.search;
            window.location.href = linkDestino + urlParams;
        }
    </script>

</body>
</html>
